<!DOCTYPE html>
<html>
<head>

    <title>Student Registration Form</title>
    <link rel="stylesheet" href="bootstrap.css">

</head>

<body>

<div class="container mt-4">

    <h2 class="text-center mb-4">Student Registration Form</h2>
    <div id="successAlert" class="alert alert-success d-none">
        Registration Successful!
    </div>

    <form onsubmit="showAlert(event)">

        <div class="row mb-3">

            <div class="col-md-6">
                <label class="form-label">Student Name</label>
                <input type="text" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Roll Number</label>
                <input type="text" class="form-control" required>
            </div>

        </div>

        <div class="row mb-3">

            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Upload Photo</label>
                <input type="file" class="form-control">
            </div>

        </div>

        <div class="mb-3">

            <label class="form-label">Gender</label><br>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender">
                <label class="form-check-label">Male</label>
            </div>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender">
                <label class="form-check-label">Female</label>
            </div>

        </div>

        <div class="mb-3">

            <label class="form-label">Department</label>

            <select class="form-select">

                <option selected>Select Department</option>
                <option>CSE</option>
                <option>IT</option>
                <option>ECE</option>
                <option>EEE</option>
                <option>Mechanical</option>

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">Subjects</label><br>

            <div class="form-check">
                <input class="form-check-input" type="checkbox">
                <label class="form-check-label">Data Structures</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox">
                <label class="form-check-label">DBMS</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox">
                <label class="form-check-label">Operating Systems</label>
            </div>

        </div>

        <button type="submit" class="btn btn-primary">
            Submit
        </button>

        <button type="reset" class="btn btn-secondary">
            Reset
        </button>

    </form>

</div>

<script>

function showAlert(event)
{
    event.preventDefault();
    document.getElementById("successAlert").classList.remove("d-none");
}

</script>

</body>
</html>
